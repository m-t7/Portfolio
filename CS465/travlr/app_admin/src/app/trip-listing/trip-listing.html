<div class="container">
  <button class="btn btn-primary float-end" (click)="addTrip()" *ngIf="isLoggedIn()">Add Trip</button>
</div>
<div class="row">
    <div *ngFor="let trip of trips" class="col-md-4">
        <app-trip-card [trip]="trip" class="card-deck mt-2"></app-trip-card>
    </div>
</div>
